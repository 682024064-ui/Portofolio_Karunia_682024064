<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kelola Skill | Admin</title>

    <link rel="icon" href="/favicon.ico">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/skills.css">

</head>

<body>

<div class="admin-layout">

    <div id="baseLayout"></div>

    <main class="admin-content">

        <section class="page-header">

            <div>

                <h2>Kelola Skill</h2>

                <p>Kelola daftar skill yang akan ditampilkan pada website portofolio.</p>

            </div>

            <button id="btnTambahSkill" class="btn btn-primary">

                <i class="fas fa-plus"></i>

                Tambah Skill

            </button>

        </section>

        <section class="card">

            <table class="table">

                <thead>

                    <tr>

                        <th width="70">ID</th>

                        <th>Skill</th>

                        <th>Icon</th>

                        <th width="170">Aksi</th>

                    </tr>

                </thead>

                <tbody id="skillsTable">

                    <tr>

                        <td colspan="4" class="text-center">

                            Memuat data...

                        </td>

                    </tr>

                </tbody>

            </table>

        </section>

    </main>

</div>

<!-- ================= MODAL ================= -->

<div id="skillModal" class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h3 id="modalTitle">

                Tambah Skill

            </h3>

            <button class="close-btn" id="closeModal">

                &times;

            </button>

        </div>

        <form id="skillForm">

            <input
                type="hidden"
                id="skillId">

            <div class="form-group">

                <label>Nama Skill</label>

                <input
                    type="text"
                    id="nama_skill"
                    required>

            </div>

            <div class="form-group">

                <label>Icon Font Awesome</label>

                <input
                    type="text"
                    id="icon_class"
                    placeholder="fa-brands fa-html5">

                <small>

                    Contoh:
                    fa-brands fa-html5

                </small>

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    id="btnBatal"
                    class="btn btn-secondary">

                    Batal

                </button>

                <button
                    type="submit"
                    class="btn btn-primary">

                    Simpan

                </button>

            </div>

        </form>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/base.js"></script>
<script src="js/skills.js"></script>

</body>

</html>
