<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Admin Portofolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>
  <body data-page="dashboard" data-title="Dashboard">
    <div class="admin-layout">
      <div id="layout-placeholder"></div>
      <main class="admin-content">
        <div class="stats-grid">
          <div class="card stat-card">
            <div class="stat-icon" style="background: #dbeafe; color: var(--primary);">
              <i class="fas fa-code"></i>
            </div>
            <div>
              <h3 id="statSkills">-</h3>
              <p>Skills</p>
            </div>
          </div>
          <div class="card stat-card">
            <div class="stat-icon" style="background: #fef9c3; color: #ca8a04;">
              <i class="fas fa-briefcase"></i>
            </div>
            <div>
              <h3 id="statExperiences">-</h3>
              <p>Pengalaman</p>
            </div>
          </div>
          <div class="card stat-card">
            <div class="stat-icon" style="background: #dcfce7; color: #16a34a;">
              <i class="fas fa-diagram-project"></i>
            </div>
            <div>
              <h3 id="statProjects">-</h3>
              <p>Proyek</p>
            </div>
          </div>
        </div>

        <div class="card" style="margin-top: 1.5rem;">
          <h2 class="card-title">Aktivitas Terbaru</h2>
          <div id="recentActivity">
            <p class="empty-state">Memuat aktivitas...</p>
          </div>
        </div>
      </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/base.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
