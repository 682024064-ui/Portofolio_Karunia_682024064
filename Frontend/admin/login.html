<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin - Portofolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body data-page="login">
    <div class="login-wrapper">
      <div class="login-card">
        <a href="/" class="login-logo">Kania<span class="dot">.</span></a>
        <h1>Admin Login</h1>
        <p class="login-subtitle">Masuk untuk mengelola data portofolio.</p>

        <div class="alert alert-error" id="loginError" style="display: none;"></div>

        <form id="loginForm">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary login-btn" id="loginBtn">Masuk</button>
        </form>

        <a href="/" class="login-back">&larr; Kembali ke Beranda</a>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
