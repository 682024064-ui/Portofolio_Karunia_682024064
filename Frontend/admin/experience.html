<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kelola Pengalaman | Admin</title>

    <link rel="icon" href="/favicon.ico">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/experience.css">

</head>

<body>

<div class="admin-layout">

    <!-- Sidebar & Navbar -->
    <div id="baseLayout"></div>

    <main class="admin-content">

        <section class="page-header">

            <div>

                <h2>Kelola Pengalaman</h2>

                <p>
                    Kelola riwayat pengalaman organisasi, magang, kerja maupun kegiatan lainnya.
                </p>

            </div>

            <button
                id="btnTambahExperience"
                class="btn btn-primary">

                <i class="fas fa-plus"></i>

                Tambah Pengalaman

            </button>

        </section>

        <section class="card">

            <table class="table">

                <thead>

                    <tr>

                        <th width="60">ID</th>

                        <th>Posisi</th>

                        <th>Perusahaan / Organisasi</th>

                        <th>Durasi</th>

                        <th width="170">Aksi</th>

                    </tr>

                </thead>

                <tbody id="experienceTable">

                    <tr>

                        <td colspan="5" class="text-center">

                            Memuat data...

                        </td>

                    </tr>

                </tbody>

            </table>

        </section>

    </main>

</div>

<!-- ================= MODAL ================= -->

<div
    id="experienceModal"
    class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h3 id="modalTitle">

                Tambah Pengalaman

            </h3>

            <button
                id="closeModal"
                class="close-btn">

                &times;

            </button>

        </div>

        <form id="experienceForm">

            <input
                type="hidden"
                id="experienceId">

            <div class="form-group">

                <label for="posisi">

                    Posisi

                </label>

                <input
                    type="text"
                    id="posisi"
                    required>

            </div>

            <div class="form-group">

                <label for="perusahaan">

                    Perusahaan / Organisasi

                </label>

                <input
                    type="text"
                    id="perusahaan"
                    required>

            </div>

            <div class="form-group">

                <label for="durasi">

                    Durasi

                </label>

                <input
                    type="text"
                    id="durasi"
                    placeholder="Contoh: Jan 2024 - Sekarang"
                    required>

            </div>

            <div class="form-group">

                <label for="deskripsi">

                    Deskripsi

                </label>

                <textarea
                    id="deskripsi"
                    rows="6"
                    required></textarea>

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    id="btnBatal"
                    class="btn btn-secondary">

                    Batal

                </button>

                <button
                    type="submit"
                    class="btn btn-primary">

                    Simpan

                </button>

            </div>

        </form>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/base.js"></script>
<script src="js/experience.js"></script>

</body>

</html>
